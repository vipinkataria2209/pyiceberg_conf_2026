version: "3.8"

services:

  # ─────────────────────────────────────────────
  # PostgreSQL — persistent catalog backend
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: iceberg-postgres
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: iceberg-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MinIO init — creates the warehouse bucket
  # ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: iceberg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 admin password &&
        mc mb --ignore-existing local/warehouse &&
        mc anonymous set public local/warehouse &&
        echo 'Bucket warehouse created.'
      "

  # ─────────────────────────────────────────────
  # Iceberg REST Catalog — backed by Postgres
  # ─────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8181:8181"   # REST Catalog API
    environment:
      # Catalog storage
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO

      # S3 / MinIO credentials
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: admin
      CATALOG_S3_SECRET__ACCESS__KEY: password
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_REGION: us-east-1

      # JDBC / Postgres backend
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg

volumes:
  minio-data:
  postgres-data:
